AWSTemplateFormatVersion: "2010-09-09"
Description: "ETL Project - RDS Postgres (demo)"

Parameters:
  DBName:
    Type: String
    Default: etldb
  DBUser:
    Type: String
    Default: etluser
  DBPassword:
    Type: String
    NoEcho: true
  DBInstanceClass:
    Type: String
    Default: db.t3.micro

Resources:
  ETLDB:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: postgres
      DBName: !Ref DBName
      MasterUsername: !Ref DBUser
      MasterUserPassword: !Ref DBPassword
      DBInstanceClass: !Ref DBInstanceClass
      AllocatedStorage: 20
      PubliclyAccessible: true
      BackupRetentionPeriod: 0
      DeletionProtection: false

Outputs:
  RdsEndpoint:
    Value: !GetAtt ETLDB.Endpoint.Address
  RdsPort:
    Value: !GetAtt ETLDB.Endpoint.Port
  DBNameOut:
    Value: !Ref DBName
  DBUserOut:
    Value: !Ref DBUser
